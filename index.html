<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Educativo - Sans Edition</title>
    <!-- Fuente Pixelada -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Panel Izquierdo: Estadísticas -->
        <div id="left-panel" class="ut-panel">
            <h2>PUNTOS:</h2>
            <div id="score" class="value">0</div>
            <h2>META NIVEL:</h2>
            <div id="level-progress" class="value" style="font-size: 14px; color: #ffff00;">0 / 1000</div>
            <h2>NIVEL:</h2>
            <div id="level" class="value">1</div>
            <h2>LÍNEAS:</h2>
            <div id="lines" class="value">0</div>
        </div>

        <!-- Centro: Tetris -->
        <div id="center-panel">
            <div id="board-container">
                <canvas id="tetris" width="300" height="600"></canvas>
                <!-- Tronco encima del tablero -->
                <img id="tronco" src="assets/tronco.png" alt="tronco">
                <!-- Sans sentado sobre el tronco -->
                <div id="sans-container">
                    <img id="sans-sprite" src="assets/sans_idle.png" alt="sans">
                </div>
            </div>
        </div>

        <!-- Panel Derecho: Siguiente / Chat -->
        <div id="right-panel">
            <div class="ut-panel" id="next-piece-panel">
                <h2>SIGUIENTE</h2>
                <canvas id="next-piece" width="120" height="120"></canvas>
            </div>
            
            <div id="title-text">
                <h2>SANS'S GAME</h2>
                <h3>TETRIS UNDERTALE</h3>
                <div class="ut-heart">❤</div>
            </div>
            
            <!-- Chat Falso -->
            <div id="chat-container">
                <div id="chat-box"></div>
            </div>
        </div>
    </div>
    
    <!-- Game Over Screen -->
    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>Geeeettttttt dunked on!</p>
        <button id="retry-btn">Reintentar</button>
    </div>

    <!-- Gaster Blaster - posicionado via JS con coordenadas de pantalla -->
    <div id="gaster-blaster"></div>

    <script src="script.js"></script>
</body>
</html>
